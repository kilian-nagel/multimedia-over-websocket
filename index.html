<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: min(480px, 100%);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #222;
      border-right: 1px solid #222;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    #status-dot.connected    { background: #4caf50; }
    #status-dot.disconnected { background: #f44336; }

    header h1 { font-size: 1rem; font-weight: 600; }

    #status-text { font-size: 0.75rem; color: #666; margin-left: auto; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .msg.mine {
      align-self: flex-end;
      background: #1d4ed8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.theirs {
      align-self: flex-start;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    .msg .meta {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-bottom: 2px;
    }

    .notice {
      align-self: center;
      font-size: 0.75rem;
      color: #555;
      padding: 4px 10px;
      background: #1a1a1a;
      border-radius: 99px;
    }

    #compose {
      padding: 12px 16px;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #1d4ed8; }

    #send {
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send:hover:not(:disabled)  { background: #2563eb; }
    #send:disabled { background: #333; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span id="status-dot"></span>
    <h1>Global Chat</h1>
    <span id="status-text">Connecting…</span>
  </header>

  <video autoplay></video>
      
  <div id="messages"></div>

  <div id="compose">
    <input id="input" type="text" placeholder="Type a message…" disabled />
    <button id="send" disabled>Send</button>
  </div>
</div>

<script>
  const CANDIDATES = [
    "video/webm;codecs=av1,opus",
    "video/webm;codecs=vp9,opus",
    "video/webm;codecs=vp8,opus",
    "video/mp4;codecs=avc1,mp4a.40.2",
  ];

  function pickCodec() {
    const supported = CANDIDATES.filter(c => MediaRecorder.isTypeSupported(c));
    console.log("Supported codecs:", supported);
    return supported[0] ?? "";
  }

  function startRecorder(stream, mimeType) {
    const opts = mimeType ? { mimeType } : {};
    const recorder = new MediaRecorder(stream, opts);

    recorder.ondataavailable = async (e) => {
      if (e.data.size === 0) return;
      const buf = await e.data.arrayBuffer();
      console.log(`[MediaRecorder] codec=${recorder.mimeType} chunk=${buf.byteLength} bytes`, buf);
    };

    recorder.start(1000);
    console.log(`[MediaRecorder] started — mimeType="${recorder.mimeType}"`);
    return recorder;
  }

  navigator.mediaDevices
    .getUserMedia({ video: true, audio: true })
    .then((localMediaStream) => {
      const video = document.querySelector("video");
      video.srcObject = localMediaStream;

      console.log("Track settings:", localMediaStream.getVideoTracks()[0].getSettings());

      const codec = pickCodec();
      startRecorder(localMediaStream, codec);
    })
    .catch((error) => {
      console.log("getUserMedia rejected:", error);
    });

  const WS_URL = `ws://${location.hostname}:8080`;

  const dot        = document.getElementById("status-dot");
  const statusText = document.getElementById("status-text");
  const messages   = document.getElementById("messages");
  const input      = document.getElementById("input");
  const sendBtn    = document.getElementById("send");

  // Stable per-tab username so "mine" bubbles look right
  const username = "User-" + Math.random().toString(36).slice(2, 6).toUpperCase();

  let ws;

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.addEventListener("open", () => {
      dot.className = "connected";
      statusText.textContent = "Connected";
      input.disabled = false;
      sendBtn.disabled = false;
      appendNotice("You joined the chat");
    });

    ws.addEventListener("close", () => {
      dot.className = "disconnected";
      statusText.textContent = "Disconnected — retrying…";
      input.disabled = true;
      sendBtn.disabled = true;
      appendNotice("Connection lost. Reconnecting in 3 s…");
      setTimeout(connect, 3000);
    });

    ws.addEventListener("error", () => {
      ws.close();
    });

    ws.addEventListener("message", (e) => {
      let payload;
      try { payload = JSON.parse(e.data); } catch { return; }
      appendMessage(payload.username, payload.text, false);
    });
  }

  function send() {
    const text = input.value.trim();
    if (!text || ws.readyState !== WebSocket.OPEN) return;

    const payload = { username, text };
    ws.send(JSON.stringify(payload));
    appendMessage(username, text, true);
    input.value = "";
  }

  function appendMessage(user, text, mine) {
    const el = document.createElement("div");
    el.className = "msg " + (mine ? "mine" : "theirs");

    if (!mine) {
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = user;
      el.appendChild(meta);
    }

    const body = document.createElement("div");
    body.textContent = text;
    el.appendChild(body);

    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
  }

  function appendNotice(text) {
    const el = document.createElement("div");
    el.className = "notice";
    el.textContent = text;
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

  connect();
</script>
</body>
</html>
